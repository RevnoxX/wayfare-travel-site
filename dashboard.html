<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WayFare — Customer Dashboard</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="assets/css/dashboard.css" />
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>

  <!-- Apply saved theme BEFORE the page renders -->
  <script>
    var savedTheme = localStorage.getItem("wayfare_theme");
    if (savedTheme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    } else {
      document.documentElement.setAttribute("data-theme", "light");
    }
  </script>
</head>

<body>
  <!-- ===================== APP SHELL ===================== -->
  <div class="app-shell">
    <!-- ---------- SIDEBAR ---------- -->
    <aside class="sidebar">
      <!-- Logo block -->
      <div class="sidebar-brand">
        <h1 class="logo">WayFare</h1>
        <p class="tagline">Your Journey Awaits</p>
      </div>

      <!-- Logged in user block -->
      <div class="sidebar-user">
        <div class="avatar" id="sidebar-avatar">--</div>
        <div class="sidebar-user-info">
          <span class="sidebar-user-name" id="sidebar-user-name">User Name</span>
          <span class="sidebar-user-email" id="sidebar-user-email">user@email.com</span>
        </div>
      </div>

      <!-- Navigation -->
      <nav class="sidebar-nav">
        <button class="nav-link active" data-section="overview" onclick="showSection('overview')">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M3 11l9-8 9 8v9a1 1 0 0 1-1 1h-5v-6h-6v6H4a1 1 0 0 1-1-1z"/></svg>
          <span>Overview</span>
        </button>

        <button class="nav-link" data-section="bookings" onclick="showSection('bookings')">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 4h16v4H4zM4 10h16v10H4zm3 3h6v2H7z"/></svg>
          <span>My Bookings</span>
        </button>

        <button class="nav-link" data-section="wishlist" onclick="showSection('wishlist')">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 21s-7.5-4.9-10-9.3C.6 8.9 2 5.5 5.2 5.5c1.9 0 3.1 1 3.8 2 .7-1 1.9-2 3.8-2C16 5.5 17.4 8.9 16 11.7 13.5 16.1 12 21 12 21z"/></svg>
          <span>Wishlist</span>
        </button>

        <button class="nav-link" data-section="reviews" onclick="showSection('reviews')">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 2l3 6.5 7 .6-5.3 4.6 1.6 6.9L12 17.3 5.7 20.6l1.6-6.9L2 9.1l7-.6z"/></svg>
          <span>Reviews</span>
        </button>

        <button class="nav-link" data-section="notifications" onclick="showSection('notifications')">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 22a2.5 2.5 0 0 0 2.5-2.5h-5A2.5 2.5 0 0 0 12 22zm7-5v-6a7 7 0 0 0-5-6.7V3.5a2 2 0 0 0-4 0v.8A7 7 0 0 0 5 11v6l-2 2v1h18v-1z"/></svg>
          <span>Notifications</span>
          <span class="nav-badge" id="nav-notif-badge">0</span>
        </button>

        <button class="nav-link" data-section="enquiries" onclick="showSection('enquiries')">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M4 4h16v12H7l-3 3zM7 8h10v2H7zm0 3h7v2H7z"/></svg>
          <span>My Enquiries</span>
        </button>

        <button class="nav-link" data-section="profile" onclick="showSection('profile')">
          <svg viewBox="0 0 24 24" class="nav-icon"><path d="M12 12a5 5 0 1 0-5-5 5 5 0 0 0 5 5zm0 2c-4 0-8 2-8 5v1h16v-1c0-3-4-5-8-5z"/></svg>
          <span>Profile</span>
        </button>
      </nav>

      <!-- Bottom controls -->
      <div class="sidebar-footer">
        <button class="btn-outline sidebar-footer-btn" id="theme-toggle-btn" onclick="toggleTheme()" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <span id="theme-toggle-label">Dark Mode</span>
        </button>
        <button class="btn-outline sidebar-footer-btn" onclick="logoutUser()" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- ---------- MAIN CONTENT ---------- -->
    <main id="swup" class="transition-fade main-area">
      <!-- Topbar -->
      <header class="topbar">
        <h2 class="topbar-title" id="topbar-title">Overview</h2>
        <div class="topbar-right">
          <button class="bell-btn" onclick="window.location.href='/'" aria-label="Home" style="margin-right: 0.5rem;">
            <svg viewBox="0 0 24 24" class="bell-icon" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
          </button>
          <button class="bell-btn" onclick="showSection('notifications')" aria-label="Notifications">
            <svg viewBox="0 0 24 24" class="bell-icon"><path d="M12 22a2.5 2.5 0 0 0 2.5-2.5h-5A2.5 2.5 0 0 0 12 22zm7-5v-6a7 7 0 0 0-5-6.7V3.5a2 2 0 0 0-4 0v.8A7 7 0 0 0 5 11v6l-2 2v1h18v-1z"/></svg>
            <span class="bell-badge" id="topbar-bell-count">0</span>
          </button>
          <div class="avatar avatar-sm" id="topbar-avatar">--</div>
        </div>
      </header>

      <!-- Scrollable content region where all sections live -->
      <div class="content">
        <!-- OVERVIEW -->
        <section id="section-overview" class="section active">
          <div class="welcome-card">
            <h2 class="welcome-title" id="overview-welcome">Welcome back</h2>
            <p class="welcome-sub" id="overview-date"></p>
          </div>

          <div class="stats-row" id="overview-stats">
            <!-- Stat cards rendered by overviewInit -->
          </div>

          <div class="overview-columns">
            <div class="card overview-upcoming" id="overview-upcoming">
              <!-- Next trip rendered by overviewInit -->
            </div>
            <div class="card overview-activity">
              <h3 class="card-title">Recent Activity</h3>
              <ul class="activity-feed" id="overview-activity">
                <!-- Activity items rendered by overviewInit -->
              </ul>
            </div>
          </div>
        </section>

        <!-- BOOKINGS -->
        <section id="section-bookings" class="section">
          <div class="filter-bar" id="bookings-filter">
            <button class="pill active" data-filter="all" onclick="filterBookings('all')">All</button>
            <button class="pill" data-filter="pending" onclick="filterBookings('pending')">Pending</button>
            <button class="pill" data-filter="approved" onclick="filterBookings('approved')">Approved</button>
            <button class="pill" data-filter="cancelled" onclick="filterBookings('cancelled')">Cancelled</button>
          </div>
          <div class="booking-list" id="bookings-list">
            <!-- Booking cards rendered by bookingsInit -->
          </div>
        </section>

        <!-- WISHLIST -->
        <section id="section-wishlist" class="section">
          <div class="wishlist-grid" id="wishlist-grid">
            <!-- Wishlist cards rendered by wishlistInit -->
          </div>
        </section>

        <!-- REVIEWS -->
        <section id="section-reviews" class="section">
          <div class="card review-form-card">
            <h3 class="card-title">Leave a Review</h3>
            <div id="review-form-body">
              <!-- Review form or empty message rendered by reviewsInit -->
            </div>
          </div>

          <h3 class="section-subheading">My Reviews</h3>
          <div class="review-list" id="reviews-list">
            <!-- Review cards rendered by reviewsInit -->
          </div>
        </section>

        <!-- NOTIFICATIONS -->
        <section id="section-notifications" class="section">
          <div class="notif-topbar">
            <span class="notif-count-label" id="notif-count-label">0 unread</span>
            <button class="btn-outline" onclick="markAllNotificationsRead()" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
              Mark All as Read
            </button>
          </div>
          <div class="notif-list" id="notifications-list">
            <!-- Notification rows rendered by notificationsInit -->
          </div>
        </section>

        <!-- ENQUIRIES -->
        <section id="section-enquiries" class="section">
          <div class="enquiries-header">
            <h3 class="section-subheading">My Enquiries</h3>
            <button class="btn-primary" onclick="openEnquiryModal()" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              New Enquiry
            </button>
          </div>
          <div class="enquiry-list" id="enquiries-list">
            <!-- Enquiry cards rendered by enquiriesInit -->
          </div>
        </section>

        <!-- PROFILE -->
        <section id="section-profile" class="section">
          <div class="profile-columns">
            <div class="card profile-card" id="profile-edit-card">
              <!-- Edit profile form rendered by profileInit -->
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- ===================== ENQUIRY MODAL ===================== -->
  <div class="modal-overlay" id="enquiry-modal">
    <div class="modal">
      <div class="modal-head">
        <h3 class="card-title">New Enquiry</h3>
        <button class="modal-close" onclick="closeEnquiryModal()">&times;</button>
      </div>
      <div class="modal-body">
        <label class="field-label" for="enquiry-subject">Subject</label>
        <input type="text" class="field-input" id="enquiry-subject" placeholder="What is your enquiry about?" />

        <label class="field-label" for="enquiry-message">Message</label>
        <textarea class="field-input field-textarea" id="enquiry-message" placeholder="Type your message here..."></textarea>

        <p class="field-error" id="enquiry-error"></p>
      </div>
      <div class="modal-foot">
        <button class="btn-outline" onclick="closeEnquiryModal()">Cancel</button>
        <button class="btn-primary" onclick="submitEnquiry()"><i data-lucide="send" style="width:16px; height:16px; margin-right:4px; vertical-align:middle;"></i> Submit Enquiry</button>
      </div>
    </div>
  </div>

  <!-- ===================== CANCEL BOOKING MODAL ===================== -->
  <div id="cancel-modal" style="display:none;" class="modal-overlay">
    <div class="modal-box" style="max-width: 420px;">
      <div class="modal-header">
        <h3>Cancel Booking</h3>
        <button id="cancel-modal-close" class="modal-close-btn">&times;</button>
      </div>
      <div class="modal-body">
        <p id="cancel-modal-msg">Are you sure you want to cancel this booking?</p>
        <p style="margin-top:0.5rem; opacity:0.7; font-size:0.85rem;">
          This action cannot be undone.
        </p>
      </div>
      <div class="modal-footer">
        <button id="cancel-confirm-btn" class="btn-primary"><i data-lucide="x-circle" style="width:16px; height:16px; margin-right:4px; vertical-align:middle;"></i> Yes, Cancel Booking</button>
        <button id="cancel-dismiss-btn" class="btn-outline">Go Back</button>
      </div>
    </div>
  </div>

  <!-- ===================== TOAST CONTAINER ===================== -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ===================== SCRIPTS ===================== -->
  <script src="assets/js/dashboard/core.js"></script>
  <script src="assets/js/dashboard/bookings.js"></script>
  <script src="assets/js/dashboard/wishlist.js"></script>
  <script src="assets/js/dashboard/reviews.js"></script>
  <script src="assets/js/dashboard/notifications.js"></script>
  <script src="assets/js/dashboard/enquiries.js"></script>
  <script src="assets/js/dashboard/profile.js"></script>
  
  <wayfare-cursor></wayfare-cursor>
  <script src="assets/js/cursor-component.js"></script>
</body>
</html>
